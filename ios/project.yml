# XcodeGen spec: CI runs `xcodegen generate` to produce padMule.xcodeproj, so the
# gnarly .pbxproj is never hand-written or committed. See
# docs/wiki/mac-toolchain-setup.md.
#
# The FFI wiring: uniffi emits gen/mule_ffi.swift (the Swift API) + gen/mule_ffiFFI.modulemap
# (+ mule_ffiFFI.h) - CI renames the modulemap to gen/module.modulemap, which is the
# name Swift's include-path lookup requires - and cargo emits libs/libmule_ffi.a.
# Swift needs that modulemap to `import mule_ffiFFI`, and the linker needs -lmule_ffi.
name: padMule
options:
  bundleIdPrefix: us.ajbconsulting
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  padMule:
    type: application
    platform: iOS
    sources:
      - path: padMule/Sources
      - path: gen/mule_ffi.swift
        # generated by uniffi-bindgen in CI
        optional: true
      # The pre-stroked launch splash, bundled as a resource (Copy Bundle
      # Resources); loaded by SplashView from the app bundle.
      - path: padMule/Resources
      # App icon asset catalog (single 1024 icon; iOS applies the corner mask).
      - path: padMule/Assets.xcassets
    info:
      path: padMule/Info.plist
      properties:
        CFBundleDisplayName: padMule
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        # Completed downloads land in Documents/. These two keys are what make
        # that folder REACHABLE - without them a finished file exists but the
        # user has no way to open it, which is not a finished download.
        # UIFileSharingEnabled: expose Documents/ over USB (Finder/iTunes).
        # LSSupportsOpeningDocumentsInPlace: show it in the Files app, on-device.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # padMule needs outbound TCP/UDP to arbitrary peers; no ATS exemption is
        # required for raw sockets, but the engine is not HTTP so nothing here.
        #
        # Local network access. WITHOUT this key iOS 14+ SILENTLY DROPS every
        # outgoing packet to the LAN - no error, no failure, just nothing - so
        # the port-mapping probe cannot work and the prompt has no reason to
        # show the user. (developer.apple.com/forums/thread/661606)
        #
        # NOTE this key alone does NOT revive UPnP: SSDP M-SEARCH goes to the
        # MULTICAST address 239.255.255.250, and multicast on real hardware also
        # needs the restricted com.apple.developer.networking.multicast
        # entitlement, which requires Apple approval and is unreachable for a
        # free-signed sideloaded app. The way out is unicast port mapping
        # (NAT-PMP straight at the gateway) - see docs/wiki/mac-toolchain-setup.md.
        NSLocalNetworkUsageDescription:
          padMule asks your router to open its port so other peers can reach you
          directly. Without it you can still download, but connections are
          slower to establish.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: us.ajbconsulting.padMule
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "2" # iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # uniffi glue: find module.modulemap + the header, and link the staticlib.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/gen
        HEADER_SEARCH_PATHS: $(SRCROOT)/gen
        # The staticlib is arch+platform specific: the device .ipa build stages
        # libs/ (aarch64-apple-ios); the simulator test build stages libs-sim/
        # (aarch64-apple-ios-sim). A device .a cannot link into a simulator binary,
        # so the search path is SDK-conditional.
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": $(SRCROOT)/libs
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": $(SRCROOT)/libs-sim
        OTHER_LDFLAGS: -lmule_ffi
        # Built unsigned; AltStore/Sideloadly re-signs with your Apple ID at install.
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        ENABLE_BITCODE: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"

  # Unit tests for the pure Swift decision logic (present() sort/filter, and later
  # the result color + model state mapping). Runs on the iOS SIMULATOR in CI only
  # (no Apple toolchain locally): the FFI is built for aarch64-apple-ios-sim and
  # `xcodebuild test` hosts the bundle inside the padMule app, so `@testable import
  # padMule` reaches internal symbols and the generated FFI types (SearchHit, ...)
  # resolve from the app binary. See .github/workflows/ios-test.yml.
  padMuleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: padMuleTests
    dependencies:
      - target: padMule
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: us.ajbconsulting.padMuleTests
        GENERATE_INFOPLIST_FILE: "YES"
        # `@testable import padMule` transitively imports the generated mule_ffiFFI
        # clang module, so the test target must also see gen/module.modulemap. The
        # FFI symbols themselves come from the host app (TEST_HOST), so no -lmule_ffi.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/gen
        HEADER_SEARCH_PATHS: $(SRCROOT)/gen
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""

# A shared scheme so `xcodebuild test -scheme padMule` builds the app + runs the
# unit-test bundle against it on a simulator.
schemes:
  padMule:
    build:
      targets:
        padMule: all
        padMuleTests: [test]
    test:
      targets:
        - padMuleTests
